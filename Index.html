<style>
  :root {
    --bg: #1A1816;

    --faint: #564F47;
    --amber: #C99A5B;
    --amberDeep: #8A6A3E;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 1.5rem 1rem 3rem;
  }
  #app { width: 100%; max-width: 480px; }
  button { font-family: Georgia, serif; }
  .dim { color: var(--dim); }
  .faint { color: var(--faint); }
  .amber { color: var(--amber); }
  .p { font-size: 14px; line-height: 1.6; margin: 4px 0; }
  .section {
    margin-bottom: 24px; padding: 16px 14px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
  }
  .section-title {
    letter-spacing: 0.2em; font-size: 11px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .check-row {
    font-family: Georgia, 'Times New Roman', serif;
    display: flex; align-items: center; gap: 14px; width: 100%;
    text-align: left; padding: 13px 14px; margin-bottom: 8px; border-radius: 8px;
    background: var(--panel); border: 1px solid var(--line);
    color: var(--text); font-size: 16px; cursor: pointer;
    transition: border 250ms ease, color 250ms ease;
  }
  .check-row.checked { border-color: var(--amberDeep); color: var(--dim); }
  .check-row.disabled { cursor: default; }
  .check-row .txt.checked { text-decoration: line-through; text-decoration-color: var(--faint); }
  .dot {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    background: transparent; border: 1px solid var(--faint);
    transition: background 250ms ease;
  }
  .dot.checked { background: var(--amber); border-color: var(--amber); }
  .small-dot {
    width: 15px; height: 15px; border-radius: 50%;
    background: transparent; border: 1px solid var(--faint);
    transition: background 350ms ease;
  }
  .small-dot.checked { background: var(--amber); border-color: var(--amber); }
  .badge {
    display: inline-block; font-size: 10px; letter-spacing: 0.04em;
    color: var(--amber); border: 1px solid var(--amberDeep); border-radius: 4px;
    padding: 1px 6px; line-height: 1.5; white-space: nowrap; font-style: normal;
  }
  .btn {
    font-size: 14px; padding: 8px 18px; border-radius: 999px; cursor: pointer;
  }
  .btn-primary { background: var(--amber); color: var(--bg); border: 1px solid var(--amber); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--faint); }
  .nav-btn {
    font-size: 22px; line-height: 1; width: 28px; height: 28px;
    background: transparent; border: none; cursor: pointer; color: var(--amber); padding: 0;
  }
  .nav-btn:disabled { color: var(--faint); cursor: default; }
  .tabs { display: flex; gap: 4px; margin-top: 20px; border-bottom: 1px solid var(--line); }
  .tab-btn {
    flex: 1; padding: 10px 4px; background: transparent; cursor: pointer;
    border: none; border-bottom: 2px solid transparent; color: var(--dim);
    font-size: 14px; margin-bottom: -1px; transition: color 200ms ease, border 200ms ease;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--amber); }
  textarea {
    font-family: Georgia, serif; width: 100%; box-sizing: border-box; margin-top: 6px;
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px; font-size: 14px; resize: vertical;
  }
  a { color: var(--amber); }
</style>
</head>

// ---------- helpers ----------
function parseDate(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function toDateStr(d) { const p = n => String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function dayNumberToday(startDate) {
  const start = parseDate(startDate);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((today - start) / 86400000) + 1;
}
function dateOfDay(startDate, n) { const d = parseDate(startDate); d.setDate(d.getDate() + (n-1)); return d; }
function phaseOfDay(globalDay) {
  const idx = Math.min(Math.max(Math.floor((globalDay-1)/PHASE_LEN),0),3);
  const within = globalDay - idx*PHASE_LEN;
  return { idx, within };
}
function phaseStartDay(idx) { return idx*PHASE_LEN + 1; }
function emptyDay() { return { mvd: false, full: {}, mvdChecks: {} }; }
function itemText(it) { return typeof it === "string" ? it : it.t; }
function itemBadge(it) { return typeof it === "string" ? null : it.badge; }
function isComplete(day, phase) {
  if (!day || !phase) return false;
  if (day.mvd) return phase.mvd.every((_,i) => day.mvdChecks[i]);
  return phase.daily.every((_,i) => day.full[i]);
}
function checkedCount(day) {
  if (!day) return 0;
  const checks = day.mvd ? day.mvdChecks : day.full;
  return Object.values(checks).filter(Boolean).length;
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ---------- persistence (localStorage) ----------
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (!d.weeks) d.weeks = {};
    if (!d.reflections) d.reflections = {};
    return d;
  } catch { return null; }
}
function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}

// ---------- app state ----------
let state = {
  data: loadData(),
  selected: 1,
  tab: "today",
  viewPhase: 0,
};
if (state.data && state.data.startDate) {
  const t = Math.min(Math.max(dayNumberToday(state.data.startDate), 1), PHASE_LEN*4);
  state.selected = t;
  state.viewPhase = phaseOfDay(t).idx;
}

function persist(next) { state.data = next; saveData(next); render(); }

function begin(offsetDays) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  const next = { startDate: toDateStr(d), days: {}, weeks: {}, reflections: {} };
  state.data = next;
  saveData(next);
  state.selected = 1;
  state.tab = "today";
  render();
}

function updateDay(selected, mutate) {
  const d = Object.assign(emptyDay(), (state.data.days && state.data.days[selected]) || {});
  mutate(d);
  const days = Object.assign({}, state.data.days, { [selected]: d });
  persist(Object.assign({}, state.data, { days }));
}
function updateWeek(weekKey, mutate) {
  const w = Object.assign({ weekly: {} }, (state.data.weeks && state.data.weeks[weekKey]) || {});
  mutate(w);
  const weeks = Object.assign({}, state.data.weeks, { [weekKey]: w });
  persist(Object.assign({}, state.data, { weeks }));
}
function setReflection(weekKey, i, val) {
  const r = Object.assign({}, (state.data.reflections && state.data.reflections[weekKey]) || {});
  r[i] = val;
  const reflections = Object.assign({}, state.data.reflections, { [weekKey]: r });
  persist(Object.assign({}, state.data, { reflections }));
}

// ---------- render ----------
const app = document.getElementById("app");

function render() {
  if (state.data === null) { renderStart(); return; }
  renderMain();
}

        <h1 style="font-size:40px;font-weight:normal;margin:0.4em 0 0.2em;">The Ledger</h1>
        <p style="color:var(--dim);font-style:italic;line-height:1.6;">
          Three hundred days. Foundation, Attention, Strength &amp; Belonging, Integration. A missed item is just a missed item — you never restart.
        </p>
        <div style="display:flex;gap:12px;justify-content:center;margin-top:32px;">
          <button id="begin-today" class="btn btn-primary">Begin today</button>
          <button id="begin-tomorrow" class="btn btn-ghost">Begin tomorrow</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById("begin-today").onclick = () => begin(0);
  document.getElementById("begin-tomorrow").onclick = () => begin(1);
}

function renderMain() {
  const data = state.data;
  const rawToday = dayNumberToday(data.startDate);
  const todayN = Math.min(Math.max(rawToday, 1), PHASE_LEN*4);
  const { idx: selPhaseIdx, within: selWithin } = phaseOfDay(state.selected);
  const phase = PHASES[selPhaseIdx];
  const weekInPhase = Math.ceil(selWithin/7);
  const weekKey = `${selPhaseIdx}-${weekInPhase}`;

  let practiced = 0;
  for (const k in (data.days || {})) {
    const gd = Number(k);
    const p = PHASES[phaseOfDay(gd).idx];
    if (isComplete(data.days[k], p)) practiced++;
  }

  app.innerHTML = `
    <div style="display:flex;align-items:baseline;justify-content:space-between;">
      <div>
        <div style="letter-spacing:0.3em;font-size:11px;color:var(--dim);text-transform:uppercase;">Phase ${phase.n} of 4</div>
        <h1 style="font-size:28px;font-weight:normal;margin:0.15em 0 0;">${esc(phase.name)}</h1>
      </div>
      <div style="text-align:right;">
        <div style="font-size:26px;color:var(--amber);line-height:1;">${practiced}</div>
        <div style="color:var(--dim);font-size:12px;font-style:italic;">${practiced===1?"day":"days"} of evidence</div>
      </div>
    </div>

    <div class="tabs">
      ${[["today","Today"],["week","Week"],["phases","Phases"],["guide","Guide"]].map(([id,label]) =>
        `<button class="tab-btn ${state.tab===id?"active":""}" data-tab="${id}">${label}</button>`
      ).join("")}
    </div>

    <div id="tab-content"></div>

    <div style="margin-top:36px;text-align:center;color:var(--faint);font-size:13px;font-style:italic;line-height:1.7;">
      A missed item is just a missed item. You never restart.<br>
      ${selPhaseIdx < 3
        ? `Phase ${phase.n+1} — ${esc(PHASES[selPhaseIdx+1].name)} — begins day ${phaseStartDay(selPhaseIdx+1)}.`
        : "The final phase. After this, the system is simply how you live."}
    </div>
  `;

  app.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = () => { state.tab = btn.dataset.tab; render(); };
  });

  const content = document.getElementById("tab-content");
  if (state.tab === "today") content.innerHTML = todayTabHTML(data, phase, selPhaseIdx, selWithin, todayN, rawToday, weekKey);
  else if (state.tab === "week") content.innerHTML = weekTabHTML(data, phase, weekInPhase, weekKey, state.selected <= todayN);
  else if (state.tab === "phases") content.innerHTML = phasesTabHTML(data, todayN);
  else content.innerHTML = guideTabHTML(phase);

  attachTabHandlers(selPhaseIdx, selWithin, todayN, rawToday, weekKey, weekInPhase, data, phase);
}

function todayTabHTML(data, phase, phaseIdx, within, todayN, rawToday, weekKey) {
  const selected = state.selected;
  const day = Object.assign(emptyDay(), (data.days && data.days[selected]) || {});
  const items = day.mvd ? phase.mvd : phase.daily;
  const checks = day.mvd ? day.mvdChecks : day.full;
  const selDate = dateOfDay(data.startDate, selected);
  const isSunday = selDate.getDay() === 0;
  const complete = isComplete(day, phase);
  const done = checkedCount(day);
  const total = items.length;
  const reflections = (data.reflections && data.reflections[weekKey]) || {};
  const unlocked = selected <= todayN && rawToday >= 1;
  const canBack = selected > 1;
  const canFwd = selected < todayN && rawToday >= 1;
  const isToday = selected === todayN && rawToday >= 1 && rawToday <= PHASE_LEN*4;
  const intention = phase.intentions[Math.min(Math.ceil(within/7), phase.intentions.length)-1];
  const quote = phase.quotes[(within-1) % phase.quotes.length];

  return `
    <div style="margin-top:22px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <div style="display:flex;align-items:baseline;gap:10px;">
          <button class="nav-btn" id="nav-back" ${canBack?"":"disabled"}>‹</button>
          <div>
            <div style="font-size:20px;">
              ${isToday?"Today":`Day ${within}`}
              <span style="color:var(--dim);font-size:14px;"> · P${phase.n} · Day ${within} · Wk ${Math.ceil(within/7)}</span>
            </div>
            <div style="color:var(--dim);font-size:13px;font-style:italic;">
              ${selDate.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"})}
            </div>
          </div>
          <button class="nav-btn" id="nav-fwd" ${canFwd?"":"disabled"}>›</button>
        </div>
        <button id="mvd-toggle" ${unlocked?"":"disabled"} style="font-size:12px;padding:6px 12px;border-radius:999px;cursor:${unlocked?"pointer":"default"};background:${day.mvd?"var(--amberDeep)":"transparent"};color:${day.mvd?"var(--text)":"var(--dim)"};opacity:${unlocked?1:0.5};border:1px solid ${day.mvd?"var(--amberDeep)":"var(--faint)"};">
          Minimum viable day
        </button>
      </div>

      ${!unlocked ? `<div style="margin-top:16px;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:8px;font-size:14px;font-style:italic;color:var(--dim);">
        This day hasn't arrived yet. You can read what's ahead, but it stays sealed until day ${within} of Phase ${phase.n}.
      </div>` : ""}

      <div style="margin-top:18px;padding:18px 16px;background:var(--panel);border:1px solid var(--amberDeep);border-radius:8px;text-align:center;">
        <div style="color:var(--amber);font-size:22px;line-height:1;margin-bottom:6px;">"</div>
        <div style="font-size:17px;font-style:italic;color:var(--text);line-height:1.5;">${esc(quote)}</div>
      </div>

      <div style="margin-top:14px;padding:10px 14px;border-left:2px solid var(--amber);background:var(--panel);font-size:14px;font-style:italic;color:var(--text);">
        This week: ${esc(intention)}
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-top:18px;flex-wrap:wrap;">
        <div style="display:flex;gap:7px;flex-wrap:wrap;">
          ${items.map((_,i) => `<span class="small-dot ${checks[i]?"checked":""}"></span>`).join("")}
        </div>
        <span style="color:var(--dim);font-size:12px;font-style:italic;margin-left:4px;">${done} of ${total}</span>
      </div>

      <div style="margin-top:14px;opacity:${unlocked?1:0.55};">
        ${items.map((item,i) => {
          const checked = !!checks[i];
          const badge = itemBadge(item);
          return `<button class="check-row ${checked?"checked":""} ${unlocked?"":"disabled"}" data-item-idx="${i}" ${unlocked?"":"disabled"}>
            <span class="dot ${checked?"checked":""}"></span>
            <span style="display:flex;flex-direction:column;gap:3px;align-items:flex-start;">
              <span class="txt ${checked?"checked":""}">${esc(itemText(item))}</span>
              ${badge?`<span class="badge">${esc(badge)}</span>`:""}
            </span>
          </button>`;
        }).join("")}
      </div>

      ${complete ? `<div style="margin-top:12px;padding:12px 14px;background:var(--panel);border:1px solid var(--amberDeep);border-radius:8px;font-size:14px;font-style:italic;color:var(--amber);">
        ${day.mvd ? "A minimum viable day counts in full. That's the whole philosophy." : esc(COMPLETION_LINES[(within-1)%COMPLETION_LINES.length])}
        ${MILESTONES[within] ? `<div style="margin-top:8px;color:var(--text);">${esc(MILESTONES[within])}</div>` : ""}
      </div>` : ""}

      ${isSunday && unlocked ? `<div style="margin-top:24px;padding:16px 14px;background:var(--panel);border:1px solid var(--amberDeep);border-radius:8px;">
        <div style="letter-spacing:0.2em;font-size:11px;color:var(--amber);text-transform:uppercase;">★ Reflection — ten minutes</div>
        ${phase.reflection.map((q,i) => `
          <div style="margin-top:14px;">
            <div style="font-size:14px;color:var(--text);">${i+1}. ${esc(q)}</div>
            <textarea data-reflect-idx="${i}" rows="2" placeholder="…">${esc(reflections[i]||"")}</textarea>
          </div>
        `).join("")}
      </div>` : ""}
    </div>
  `;
}

function weekTabHTML(data, phase, weekInPhase, weekKey, unlocked) {
  const w = Object.assign({ weekly: {} }, (data.weeks && data.weeks[weekKey]) || {});
  const intention = phase.intentions[Math.min(weekInPhase, phase.intentions.length)-1];
  return `
    <div style="margin-top:22px;">
      <div style="font-size:20px;">Phase ${phase.n} · Week ${weekInPhase} <span style="color:var(--dim);font-size:14px;">of 11</span></div>

      <div style="margin-top:14px;padding:14px;background:var(--panel);border:1px solid var(--amberDeep);border-radius:8px;">
        <div style="letter-spacing:0.2em;font-size:11px;color:var(--amber);text-transform:uppercase;">This week's intention</div>
        <div style="font-size:18px;margin-top:6px;">${esc(intention)}</div>
      </div>

      <div style="margin-top:20px;letter-spacing:0.2em;font-size:11px;color:var(--dim);text-transform:uppercase;">Weekly targets</div>
      <div style="margin-top:10px;opacity:${unlocked?1:0.55};">
        ${phase.weekly.map((item,i) => {
          const checked = !!w.weekly[i];
          const badge = itemBadge(item);
          return `<button class="check-row ${checked?"checked":""}" data-week-idx="${i}" ${unlocked?"":"disabled"}>
            <span class="dot ${checked?"checked":""}"></span>
            <span style="display:flex;flex-direction:column;gap:3px;align-items:flex-start;">
              <span class="txt ${checked?"checked":""}">${esc(itemText(item))}</span>
              ${badge?`<span class="badge">${esc(badge)}</span>`:""}
            </span>
          </button>`;
        }).join("")}
      </div>

      ${!unlocked ? `<div style="margin-top:14px;font-size:13px;font-style:italic;color:var(--dim);">
        Sealed until this week arrives. Here as a preview of what's ahead.
      </div>` : ""}
    </div>
  `;
}

function phasesTabHTML(data, todayN) {
  const curIdx = phaseOfDay(todayN).idx;
  const p = PHASES[state.viewPhase];
  const startDay = phaseStartDay(state.viewPhase);
  const startDate = data.startDate ? dateOfDay(data.startDate, startDay).toLocaleDateString(undefined,{month:"long",day:"numeric"}) : "";
  const phState = state.viewPhase < curIdx ? "complete" : state.viewPhase === curIdx ? "active" : "ahead";

  let phaseDone = 0;
  for (let i=0;i<PHASE_LEN;i++) {
    const gd = startDay + i;
    if (isComplete(data.days && data.days[gd], PHASES[state.viewPhase])) phaseDone++;
  }

  return `
    <div style="margin-top:22px;">
      <div style="font-size:20px;margin-bottom:2px;">The roadmap</div>
      <p style="font-size:13px;color:var(--dim);font-style:italic;margin-top:0;margin-bottom:14px;">
        The whole arc, and what to set up before each stretch. Tap a phase to read it.
      </p>
      <div style="display:flex;gap:6px;">
        ${PHASES.map((ph,i) => {
          const sel = i === state.viewPhase;
          const reached = i <= curIdx;
          return `<button class="phase-select" data-phase-idx="${i}" style="flex:1;padding:8px 4px;border-radius:6px;cursor:pointer;font-size:13px;background:${sel?"var(--panel)":"transparent"};border:1px solid ${sel?"var(--amberDeep)":"var(--line)"};color:${reached?"var(--text)":"var(--dim)"};">${ph.n}</button>`;
        }).join("")}
      </div>

      <div style="margin-top:16px;padding:16px 14px;background:var(--panel);border:1px solid ${phState==="active"?"var(--amberDeep)":"var(--line)"};border-radius:8px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <div style="font-size:20px;"><span style="color:var(--amber);">Phase ${p.n}</span> · ${esc(p.name)}</div>
          <div style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:${phState==="ahead"?"var(--faint)":"var(--amber)"};">
            ${phState==="complete"?"Complete":phState==="active"?"Active":"Ahead"}
          </div>
        </div>
        <p style="font-size:14px;color:var(--text);line-height:1.55;margin-top:8px;">${esc(p.purpose)}</p>
        <div style="font-size:12px;color:var(--dim);font-style:italic;margin-top:6px;">
          Days ${startDay}–${startDay+PHASE_LEN-1}${startDate?` · begins ${startDate}`:""} · ${phaseDone}/75 logged
        </div>

        <div style="margin-top:14px;letter-spacing:0.18em;font-size:10px;color:var(--dim);text-transform:uppercase;">Daily practice</div>
        <ul style="margin:8px 0 0;padding-left:18px;color:var(--text);font-size:13.5px;line-height:1.7;">
          ${p.daily.map(d => `<li>${esc(itemText(d))}${itemBadge(d)?` <span class="badge">${esc(itemBadge(d))}</span>`:""}</li>`).join("")}
        </ul>

        <div style="margin-top:14px;letter-spacing:0.18em;font-size:10px;color:var(--dim);text-transform:uppercase;">Weekly targets</div>
        <ul style="margin:8px 0 0;padding-left:18px;color:var(--dim);font-size:13.5px;line-height:1.7;">
          ${p.weekly.map(d => `<li>${esc(itemText(d))}${itemBadge(d)?` <span class="badge">${esc(itemBadge(d))}</span>`:""}</li>`).join("")}
        </ul>

        <div style="margin-top:14px;letter-spacing:0.18em;font-size:10px;color:var(--amber);text-transform:uppercase;">Prepare — what to set up</div>
        <ul style="margin:8px 0 0;padding-left:18px;color:var(--text);font-size:13.5px;line-height:1.7;">
          ${(p.prepare||[]).map(d => `<li>${esc(d)}</li>`).join("")}
        </ul>

        ${phState!=="ahead" ? `<button id="phase-jump" class="btn btn-ghost" style="margin-top:16px;">${phState==="active"?"Go to today":"Open this phase"}</button>` : ""}
      </div>

      <div style="margin-top:16px;font-size:12px;color:var(--faint);font-style:italic;line-height:1.6;text-align:center;">
        Phase 1 builds the floor. Phase 2 protects attention. Phase 3 builds strength and belonging. Phase 4 turns the practices into a deliberate life.
      </div>
    </div>
  `;
}

function guideTabHTML(phase) {
  return `
    <div style="margin-top:22px;">
      <div class="section">
        <div class="section-title">The Food Plan</div>
        ${FOOD_RULE.do.map(l => `<p class="p">${esc(l)}</p>`).join("")}
        ${FOOD_RULE.notes.map(n => `<p class="p" style="font-style:italic;color:var(--dim);">${esc(n)}</p>`).join("")}
      </div>

      <div class="section">
        <div class="section-title">The Three Routines</div>
        ${ROUTINES.map(r => `
          <div style="margin-bottom:12px;">
            <div style="color:var(--amber);font-size:13px;letter-spacing:0.1em;text-transform:uppercase;">${esc(r.name)}</div>
            <p class="p">${r.items.map(esc).join(" · ")}</p>
          </div>
        `).join("")}
      </div>

      <div class="section">
        <div class="section-title">${esc(phase.name)} — The Quotes</div>
        <p class="p" style="font-style:italic;color:var(--dim);margin-bottom:8px;">One surfaces on Today each day. The whole collection for this phase:</p>
        ${phase.quotes.map((l,i) => `<p class="p" style="display:flex;gap:10px;"><span style="color:var(--faint);min-width:18px;text-align:right;">${i+1}</span><span style="font-style:italic;">${esc(l)}</span></p>`).join("")}
      </div>

      <div class="section">
        <div class="section-title">${esc(phase.name)} — The Eleven Intentions</div>
        ${phase.intentions.map((l,i) => `<p class="p" style="display:flex;gap:10px;"><span class="amber" style="min-width:18px;text-align:right;">${i+1}</span><span>${esc(l)}</span></p>`).join("")}
      </div>

      <div class="section">
        <div class="section-title">Milestone Seals</div>
        <p class="p" style="font-style:italic;color:var(--dim);margin-bottom:8px;">Each reveals itself on Today when you reach its day within a phase.</p>
        ${MILESTONE_DAYS.map(d => `<p class="p" style="display:flex;gap:10px;"><span class="amber" style="min-width:48px;">Day ${d}</span><span class="faint">sealed until reached</span></p>`).join("")}
      </div>
    </div>
  `;
}

function attachTabHandlers(selPhaseIdx, selWithin, todayN, rawToday, weekKey, weekInPhase, data, phase) {
  if (state.tab === "today") {
    const backBtn = document.getElementById("nav-back");
    const fwdBtn = document.getElementById("nav-fwd");
    if (backBtn) backBtn.onclick = () => { if (state.selected > 1) { state.selected--; render(); } };
    if (fwdBtn) fwdBtn.onclick = () => { if (state.selected < todayN) { state.selected++; render(); } };

    const mvdBtn = document.getElementById("mvd-toggle");
    if (mvdBtn && !mvdBtn.disabled) mvdBtn.onclick = () => updateDay(state.selected, d => { d.mvd = !d.mvd; });

    document.querySelectorAll("[data-item-idx]").forEach(btn => {
      if (btn.disabled) return;
      btn.onclick = () => {
        const i = Number(btn.dataset.itemIdx);
        updateDay(state.selected, d => {
          const key = d.mvd ? "mvdChecks" : "full";
          d[key] = Object.assign({}, d[key], { [i]: !d[key][i] });
        });
      };
    });

    document.querySelectorAll("[data-reflect-idx]").forEach(ta => {
      ta.onblur = () => setReflection(weekKey, Number(ta.dataset.reflectIdx), ta.value);
    });
  } else if (state.tab === "week") {
    const unlocked = state.selected <= todayN;
    document.querySelectorAll("[data-week-idx]").forEach(btn => {
      if (btn.disabled) return;
      btn.onclick = () => {
        const i = Number(btn.dataset.weekIdx);
        updateWeek(weekKey, w => { w.weekly = Object.assign({}, w.weekly, { [i]: !w.weekly[i] }); });
      };
    });
  } else if (state.tab === "phases") {
    document.querySelectorAll(".phase-select").forEach(btn => {
      btn.onclick = () => { state.viewPhase = Number(btn.dataset.phaseIdx); render(); };
    });
    const jumpBtn = document.getElementById("phase-jump");
    if (jumpBtn) {
      jumpBtn.onclick = () => {
        const curIdx = phaseOfDay(todayN).idx;
        const startDay = phaseStartDay(state.viewPhase);
        state.selected = state.viewPhase === curIdx ? Math.min(todayN, startDay + PHASE_LEN - 1) : startDay;
        state.tab = "today";
        render();
      };
    }
  }
}

render();
</script>
</body>
</html>
